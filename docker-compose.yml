services:
  db:
    image: postgres:16-alpine
    container_name: trivia-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      trivia_net:
        aliases:
          - trivia-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: trivia-db
      JWT_SECRET: ${JWT_SECRET}
      DISMISS_SECRET: ${DISMISS_SECRET}
      FRONTEND_URL: http://trivia.tyrelparker.dev
      NTFY_URL: ${NTFY_URL}
      NTFY_TOKEN: ${NTFY_TOKEN}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    volumes:
      - ./backend/src:/app/src
    depends_on:
      db:
        condition: service_healthy
    networks:
      - trivia_net

  frontend:
    build: ./frontend
    depends_on:
      - backend
    networks:
      - proxy
      - trivia_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.trivia.rule=Host(`trivia.tyrelparker.dev`)"
      - "traefik.http.routers.trivia.entrypoints=web"
      - "traefik.http.services.trivia.loadbalancer.server.port=80"

networks:
  proxy:
    external: true
  trivia_net:
    driver: bridge

volumes:
  db_data:
